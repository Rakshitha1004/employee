spring:
  application:
    name: employee-task-backend
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  datasource:
    url: jdbc:mysql://localhost:3306/employee_db?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 4000
  servlet:
    context-path: /

app:
  jwt:
    secret: your-secret-key-change-this-in-production-with-a-strong-key
    expiration: 86400000
  
  frontend:
    origin: http://localhost:5173

logging:
  level:
    root: INFO
    com.employee: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
